name: Swift Test (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        with:
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE
      - name: Test
        run: swift test